<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydration Plant Mini App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- Viem + Builder Code (IMPORTANT) -->
  <script type="module">
    import * as viem from "https://esm.sh/viem@2.45.0";
    import { base } from "https://esm.sh/viem@2.45.0/chains";
    import { Attribution } from "https://esm.sh/ox@0.1.0/erc8021";

    window.viem = viem;
    window.baseChain = base;
    window.Attribution = Attribution;
  </script>
</head>

<body>
  <div id="app" class="container">
    <h1>Hydration Plant Mini App</h1>

    <div id="walletDiv">
      <button id="connectWallet">Connect Wallet</button>
      <span id="walletAddress"></span>
    </div>

    <div>Water Count: <span id="waterCount">0</span></div>
    <div>Stage: <span id="stage">0</span></div>

    <div id="plantContainer">
      <div id="plant" class="plant-stage-0"></div>
      <div id="waterDropContainer"></div>
    </div>

    <button id="waterButton">I drank water 💧</button>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
